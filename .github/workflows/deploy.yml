name: Deploy & Store Release

on:
  push:
    branches: [main]
    tags:
      - '*_Store'
      - '*_Android'
      - '*_iOS'

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            PROJECT_DIR="/home/${{ secrets.SSH_USER }}/expo-projects/salaire"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            EXPECTED_SHA="${{ github.sha }}"

            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            if [ ! -d ".git" ]; then
              git clone "$REPO_URL" .
            fi

            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            git checkout main

            ACTUAL_SHA=$(git rev-parse HEAD)
            echo "Expected: $EXPECTED_SHA"
            echo "Actual:   $ACTUAL_SHA"
            if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
              echo "WARNING: SHA mismatch"
            fi

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use --lts || nvm install --lts

            npm install

            rm -rf .expo .metro-cache

            fuser -k 8085/tcp || true
            fuser -k 8086/tcp || true

            if command -v pm2 &> /dev/null; then
              pm2 delete salaire 2>/dev/null || true
              cd "$PROJECT_DIR"
              pm2 start npm --name salaire --cwd "$PROJECT_DIR" -- start -- --host lan --port 8086 -c
              pm2 save
            else
              cd "$PROJECT_DIR"
              nohup npm start -- --host lan --port 8086 -c > /tmp/salaire.log 2>&1 &
            fi

            sleep 8
            if ss -tlnp | grep -q 8086; then
              echo "Expo server listening on port 8086"
            else
              echo "WARNING: Port 8086 not yet listening, check logs"
              pm2 logs salaire --lines 30 --nostream 2>/dev/null || cat /tmp/salaire.log 2>/dev/null || true
            fi

            echo "Deploy complete"

  store-release-android:
    if: contains(github.ref, '_Store') || contains(github.ref, '_Android')
    runs-on: ubuntu-latest
    concurrency:
      group: android-store-release-${{ github.repository }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android AAB on EAS
        run: |
          CI=1 eas build --platform android --profile production --non-interactive --wait --json > android-build.json
        env:
          EXPO_EAS_PROJECT_ID: 6ceb6c7f-7f85-43c8-be7f-028ef8e51851
          EXPO_OWNER: krorun
          EXPO_PUBLIC_GITHUB_DISABLE_ADS: ${{ vars.GITHUB_DISABLE_ADS }}

      - name: Resolve Android AAB artifact URL
        run: |
          node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('android-build.json', 'utf8'));
          const build = Array.isArray(payload) ? payload[0] : payload;
          const artifactUrl =
            build?.artifacts?.applicationArchiveUrl ||
            build?.artifacts?.buildUrl;
          if (!artifactUrl) {
            console.error('Unable to resolve Android AAB URL from EAS build output.');
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `ANDROID_AAB_URL=${artifactUrl}\n`);
          NODE

      - name: Download Android AAB
        run: |
          curl -L "$ANDROID_AAB_URL" --output Salaire-android.aab

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Salaire-android.aab
          path: Salaire-android.aab

      - name: Upload to Play Store
        if: contains(github.ref, '_Store') || contains(github.ref, '_Android')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.kns.salary
          releaseFiles: Salaire-android.aab
          tracks: production

  store-release-ios:
    if: contains(github.ref, '_Store') || contains(github.ref, '_iOS')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS IPA on EAS
        run: |
          CI=1 eas build --platform ios --profile production --non-interactive --wait --json > ios-build.json
        env:
          EXPO_EAS_PROJECT_ID: 6ceb6c7f-7f85-43c8-be7f-028ef8e51851
          EXPO_OWNER: krorun
          EXPO_PUBLIC_GITHUB_DISABLE_ADS: ${{ vars.GITHUB_DISABLE_ADS }}

      - name: Resolve IPA artifact URL
        run: |
          node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('ios-build.json', 'utf8'));
          const build = Array.isArray(payload) ? payload[0] : payload;
          const artifactUrl =
            build?.artifacts?.applicationArchiveUrl ||
            build?.artifacts?.buildUrl;
          if (!artifactUrl) {
            console.error('Unable to resolve iOS IPA URL from EAS build output.');
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `IOS_IPA_URL=${artifactUrl}\n`);
          NODE

      - name: Download iOS IPA
        run: |
          curl -L "$IOS_IPA_URL" --output Salaire-ios.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Salaire-ios.ipa
          path: Salaire-ios.ipa

      - name: Decode ASC API Key
        run: |
          echo "${{ secrets.ASC_API_KEY_P8_B64 }}" | base64 -d > AuthKey.p8

      - name: Submit IPA to App Store Connect
        run: |
          if [ -n "${ASC_APP_ID}" ] && [ -n "${APPLE_TEAM_ID}" ]; then
            CI=1 eas submit \
              --platform ios \
              --path Salaire-ios.ipa \
              --non-interactive \
              --wait \
              --asc-api-key-path AuthKey.p8 \
              --asc-api-key-id "${{ secrets.ASC_API_KEY_ID }}" \
              --asc-api-key-issuer-id "${{ secrets.ASC_API_ISSUER_ID }}" \
              --asc-app-id "${ASC_APP_ID}" \
              --apple-team-id "${APPLE_TEAM_ID}"
          elif [ -n "${ASC_APP_ID}" ]; then
            CI=1 eas submit \
              --platform ios \
              --path Salaire-ios.ipa \
              --non-interactive \
              --wait \
              --asc-api-key-path AuthKey.p8 \
              --asc-api-key-id "${{ secrets.ASC_API_KEY_ID }}" \
              --asc-api-key-issuer-id "${{ secrets.ASC_API_ISSUER_ID }}" \
              --asc-app-id "${ASC_APP_ID}"
          else
            CI=1 eas submit \
              --platform ios \
              --path Salaire-ios.ipa \
              --non-interactive \
              --wait \
              --asc-api-key-path AuthKey.p8 \
              --asc-api-key-id "${{ secrets.ASC_API_KEY_ID }}" \
              --asc-api-key-issuer-id "${{ secrets.ASC_API_ISSUER_ID }}"
          fi
        env:
          EXPO_EAS_PROJECT_ID: 6ceb6c7f-7f85-43c8-be7f-028ef8e51851
          EXPO_OWNER: krorun
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
